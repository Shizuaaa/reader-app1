<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Читалка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Georgia', serif;
            background: #0d0d1a;
            color: #e0e0e0;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .background-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1920');
            background-size: cover; background-position: center;
            filter: blur(1px) brightness(0.20);
            z-index: 0; transition: background-image 0.8s ease;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 20;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .overlay.active { opacity: 1; pointer-events: all; }
        .loader {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 50; display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .loader.hidden { display: none; }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.2); border-top-color: #6c5ce7;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: #aaa; font-size: 14px; }
        .toc-panel {
            position: fixed; top: 0; left: -85%; width: 85%; max-width: 340px;
            height: 100%; height: 100dvh;
            background: rgba(10,10,20,0.97); backdrop-filter: blur(20px);
            z-index: 30; display: flex; flex-direction: column;
            transition: left 0.35s cubic-bezier(0.22,0.61,0.36,1);
            border-right: 1px solid rgba(255,255,255,0.08); overflow: hidden;
        }
        .toc-panel.open { left: 0; }
        .toc-header { padding: 20px 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .toc-header h2 { font-size: 20px; color: #fff; font-weight: normal; letter-spacing: 0.5px; }
        .toc-list { flex: 1; overflow-y: auto; padding: 10px 0; -webkit-overflow-scrolling: touch; }
        .toc-item {
            display: block; width: 100%; padding: 16px 20px; text-align: left;
            background: none; border: none; color: #bbb; font-size: 16px;
            cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent;
            font-family: 'Georgia', serif; line-height: 1.4;
        }
        .toc-item:active { background: rgba(255,255,255,0.05); }
        .toc-item.active { color: #fff; border-left-color: #6c5ce7; background: rgba(108,92,231,0.12); }
        .reader-container {
            position: relative; z-index: 1; width: 100%; max-width: 750px;
            min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column;
            pointer-events: none;
        }
        .text-window {
            flex: 1; background: rgba(0,0,0,0.82); backdrop-filter: blur(10px);
            padding: 30px 22px 100px; min-height: 100vh; min-height: 100dvh;
            transition: background 0.3s; pointer-events: auto;
        }
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 15;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            margin: -30px -22px 20px; padding: 15px 22px; pointer-events: auto;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .top-bar-left { display: flex; align-items: center; gap: 12px; }
        .menu-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 4px; cursor: pointer; flex-shrink: 0;
        }
        .menu-btn:active { background: rgba(255,255,255,0.18); }
        .menu-btn span { display: block; width: 18px; height: 2px; background: #ddd; border-radius: 2px; }
        .settings-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            color: #ddd; font-size: 18px; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .settings-btn:active { background: rgba(108,92,231,0.5); }
        .chapter-title-top {
            font-size: 16px; color: #aaa; text-align: right; flex: 1;
            margin-left: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .content { font-size: 17px; line-height: 1.85; text-align: justify; word-break: break-word; hyphens: auto; -webkit-hyphens: auto; }
        .content p { margin-bottom: 16px; }
        .float-img-left, .float-img-right, .float-img-circle {
            max-width: 45%; margin: 8px 14px 10px; border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15);
        }
        .float-img-left { float: left; margin-left: 0; shape-outside: margin-box; }
        .float-img-right { float: right; margin-right: 0; shape-outside: margin-box; }
        .float-img-circle { float: left; border-radius: 50%; shape-outside: circle(50%); width: 140px; height: 140px; object-fit: cover; margin-left: 0; }
        .chapter-heading { font-size: 26px; text-align: center; color: #fff; margin: 10px 0 25px; font-weight: normal; letter-spacing: 0.5px; text-shadow: 0 2px 15px rgba(108,92,231,0.4); }

        /* Панель настроек (модальная) */
        .settings-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 40; display: flex; align-items: flex-end; justify-content: center;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .settings-modal.open { opacity: 1; pointer-events: all; }
        .settings-sheet {
            width: 100%; max-width: 500px; max-height: 70vh;
            background: rgba(15,15,30,0.98); backdrop-filter: blur(20px);
            border-radius: 20px 20px 0 0; padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.22,0.61,0.36,1);
            overflow-y: auto;
        }
        .settings-modal.open .settings-sheet { transform: translateY(0); }
        .settings-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; margin: 0 auto 16px; }
        .settings-title { font-size: 18px; color: #fff; text-align: center; margin-bottom: 16px; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .settings-btn-item {
            padding: 12px 8px; border-radius: 12px; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15); color: #ddd;
            font-size: 13px; cursor: pointer; text-align: center;
            font-family: 'Georgia', serif; transition: all 0.2s;
        }
        .settings-btn-item:active { background: #6c5ce7; color: #fff; transform: scale(0.95); }

        /* Админ-панель */
        .admin-panel {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 500px;
            height: 100%; height: 100dvh;
            background: rgba(5,5,15,0.98); backdrop-filter: blur(20px);
            z-index: 35; display: flex; flex-direction: column;
            transition: right 0.35s cubic-bezier(0.22,0.61,0.36,1);
            border-left: 1px solid rgba(255,255,255,0.08); overflow: hidden;
        }
        .admin-panel.open { right: 0; }
        .admin-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .admin-header h2 { font-size: 20px; color: #fff; }
        .admin-close { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .admin-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        .admin-body label { display: block; color: #aaa; font-size: 13px; margin-bottom: 6px; margin-top: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .admin-body input, .admin-body textarea { width: 100%; padding: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #fff; font-size: 15px; font-family: 'Georgia', serif; resize: vertical; }
        .admin-body textarea { min-height: 120px; line-height: 1.6; }
        .btn { display: block; width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; cursor: pointer; margin-top: 8px; font-family: 'Georgia', serif; transition: all 0.2s; text-align: center; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #6c5ce7; color: #fff; }
        .btn-success { background: #00b894; color: #fff; }
        .btn-warning { background: #e17055; color: #fff; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #ddd; }
        .btn-row { display: flex; gap: 8px; }
        .btn-row .btn { flex: 1; }
        .chapter-list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 8px; gap: 8px; }
        .chapter-list-item span { flex: 1; font-size: 14px; color: #ddd; }
        .chapter-list-item button { padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #ddd; font-size: 12px; cursor: pointer; flex-shrink: 0; }

        /* Нав-бар внизу */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 15;
            display: flex; gap: 12px; padding: 12px 20px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.08);
            pointer-events: auto; justify-content: center;
        }
        .nav-btn {
            flex: 1; max-width: 200px; padding: 14px 16px; border-radius: 14px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.2);
            color: #ddd; font-size: 15px; cursor: pointer; text-align: center;
            font-family: 'Georgia', serif; min-height: 50px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .nav-btn:active { background: rgba(108,92,231,0.4); border-color: #6c5ce7; transform: scale(0.96); }
        .nav-btn:disabled { opacity: 0.3; pointer-events: none; }

        .chapter-content { display: none; animation: fadeSlide 0.35s ease; }
        .chapter-content.active { display: block; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 480px) {
            .text-window { padding: 20px 14px 110px; }
            .top-bar { margin: -20px -14px 18px; padding: 12px 14px; }
            .content { font-size: 16px; line-height: 1.75; }
            .float-img-left, .float-img-right, .float-img-circle { float: none; display: block; max-width: 100%; width: 100%; margin: 12px 0; height: auto; }
            .float-img-circle { height: 220px; }
            .chapter-heading { font-size: 22px; }
            .toc-panel { left: -90%; width: 90%; }
            .admin-panel { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="background-layer" id="bgLayer"></div>
    <div class="loader" id="loader"><div class="spinner"></div><div class="loader-text">Загрузка истории...</div></div>
    <div class="overlay" id="overlay"></div>

    <!-- Оглавление -->
    <!-- Оглавление -->
    <div class="toc-panel" id="tocPanel">
        <div class="toc-header" style="display:flex;justify-content:space-between;align-items:center;">
            <h2>📖 Оглавление</h2>
            <button id="secretAdminBtn" style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.2);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">🔑</button>
        </div>
        <div class="toc-list" id="tocList"></div>
    </div>

    <!-- Модалка настроек -->
    <div class="overlay" id="settingsOverlay" style="z-index:39;"></div>
    <div class="settings-modal" id="settingsModal">
        <div class="settings-sheet">
            <div class="settings-handle"></div>
            <div class="settings-title">⚙️ Настройки</div>
            <div class="settings-grid">
                <button class="settings-btn-item" onclick="changeBg('https://images.unsplash.com/flagged/photo-1574885173944-c23db8159846?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D')">Лаборатория </button>
                <button class="settings-btn-item" onclick="changeBg('https://images.unsplash.com/photo-1776726743389-3b57180f8b3a?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D')">Сражение</button>
                <button class="settings-btn-item" onclick="changeBg('https://images.unsplash.com/photo-1775739778612-c26bbad1b37b?q=80&w=734&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D')">Озеро воспоминаний</button>
                <button class="settings-btn-item" onclick="changeFont('Georgia')">Georgia</button>
                <button class="settings-btn-item" onclick="changeFont('Arial')">Arial</button>
                <button class="settings-btn-item" onclick="changeFont('Courier New')">Mono</button>
                <button class="settings-btn-item" onclick="toggleOpacity()">🖤 100%</button>
                <button class="settings-btn-item" onclick="toggleOpacity()">🩶 30%</button>
                <button class="settings-btn-item" onclick="closeSettings()">✕ Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Админка -->
    <div class="overlay" id="adminOverlay" style="z-index:33;"></div>
    <div class="admin-panel" id="adminPanel">
        <div class="admin-header"><h2>✍️ Панель автора</h2><button class="admin-close" id="adminClose">✕</button></div>
        <div class="admin-body">
            <label>Название главы</label>
            <input type="text" id="chapterTitleInput" placeholder="Глава 1: Начало">
            <label>Текст главы</label>
            <textarea id="chapterTextInput" placeholder="Текст главы..."></textarea>
            <input type="hidden" id="editingChapterIndex" value="-1">
            <div class="btn-row">
                <button class="btn btn-primary" id="saveChapterBtn">💾 Сохранить</button>
                <button class="btn btn-outline" id="cancelEditBtn" style="display:none;">Отмена</button>
            </div>
            <label style="margin-top:20px;">📋 Все главы</label>
            <div id="chapterListContainer"></div>
            <div class="btn-row">
                <button class="btn btn-success" id="exportBtn">📤 JSON</button>
                <button class="btn btn-outline" id="importBtn">📥 Импорт</button>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display:none;">
            <p id="syncStatus" style="font-size:12px;text-align:center;margin-top:8px;color:#888;"></p>
        </div>
    </div>

    <!-- Читалка -->
    <div class="reader-container">
        <div class="text-window" id="textWindow">
            <div class="top-bar">
                <div class="top-bar-left">
                    <div class="menu-btn" id="menuBtn"><span></span><span></span><span></span></div>
                </div>
                <div class="chapter-title-top" id="chapterTitleTop">Загрузка...</div>
                <button class="settings-btn" id="settingsBtn">⚙️</button>
            </div>
            <div id="chaptersContainer"></div>
        </div>
    </div>

    <!-- Нав-бар внизу -->
    <div class="nav-bar" id="navBar">
        <button class="nav-btn" id="prevBtn" disabled>◀ Назад</button>
        <button class="nav-btn" id="nextBtn" disabled>Далее ▶</button>
    </div>
    <script>
        // КОНФИГ
        const JSONBIN_API_KEY = '$2a$10$psgtjPI5idJwCCOV4wWc7.esW5bIqzm9LX2Fafo.L5FIbwIj25gES';
        const JSONBIN_BIN_ID = '69fa3b46aaba882197756b83';
        const ADMIN_PASSWORD = '1234';
        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

        let chaptersData = [];
        let currentChapter = 0;

        // API
        async function fetchChapters() {
            try {
                const r = await fetch(JSONBIN_URL, { headers: { 'X-Access-Key': JSONBIN_API_KEY } });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const j = await r.json();
                chaptersData = Array.isArray(j.record) ? j.record : [];
                return true;
            } catch(e) {
                const loc = localStorage.getItem('reader_backup');
                chaptersData = loc ? JSON.parse(loc) : [];
                return false;
            }
        }
        async function uploadChapters() {
            try {
                const r = await fetch(JSONBIN_URL, { method: 'PUT', headers: { 'X-Access-Key': JSONBIN_API_KEY, 'Content-Type': 'application/json' }, body: JSON.stringify(chaptersData) });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                localStorage.setItem('reader_backup', JSON.stringify(chaptersData));
                return true;
            } catch(e) {
                localStorage.setItem('reader_backup', JSON.stringify(chaptersData));
                return false;
            }
        }

        // Рендер глав
        function renderAll() {
            const c = document.getElementById('chaptersContainer');
            if (!chaptersData.length) {
                c.innerHTML = '<div style="text-align:center;padding:60px 30px;"><div style="font-size:60px;">📚</div><h3 style="color:#fff;">Пока пусто</h3></div>';
                return;
            }
            c.innerHTML = chaptersData.map((ch,i) => `
                <div class="chapter-content${i===0?' active':''}" data-ch="${i+1}">
                    <h1 class="chapter-heading">${esc(ch.title)}</h1>
                    <div class="content">${ch.content}</div>
                </div>`).join('');
        }
        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // Оглавление
        function buildTOC() {
            const l = document.getElementById('tocList');
            if (!chaptersData.length) { l.innerHTML = '<p style="color:#666;text-align:center;padding:20px;">Нет глав</p>'; return; }
            l.innerHTML = chaptersData.map((ch,i) => `
                <button class="toc-item${i===0?' active':''}" data-idx="${i}">
                    <span style="font-size:11px;color:#6c5ce7;display:block;margin-bottom:4px;">Глава ${i+1}</span>
                    ${esc(ch.title.replace(/^Глава \d+:?\s*/, ''))}
                </button>`).join('');
            l.querySelectorAll('.toc-item').forEach(b => b.addEventListener('click', () => goTo(parseInt(b.dataset.idx))));
        }

        function goTo(idx) {
            if (idx < 0 || idx >= chaptersData.length) return;
            currentChapter = idx;
            document.querySelectorAll('.chapter-content').forEach(c => c.classList.remove('active'));
            const el = document.querySelector(`[data-ch="${idx+1}"]`);
            if (el) el.classList.add('active');
            document.getElementById('chapterTitleTop').textContent = chaptersData[idx].title;
            document.getElementById('prevBtn').disabled = idx === 0;
            document.getElementById('nextBtn').disabled = idx >= chaptersData.length - 1;
            document.querySelectorAll('.toc-item').forEach((b,i) => b.classList.toggle('active', i===idx));
            closeTOC();
            window.scrollTo(0,0);
        }

        function openTOC() { document.getElementById('tocPanel').classList.add('open'); document.getElementById('overlay').classList.add('active'); }
        function closeTOC() { document.getElementById('tocPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
        document.getElementById('menuBtn').onpointerup = e => { e.preventDefault(); openTOC(); };
        document.getElementById('overlay').onpointerup = e => { e.preventDefault(); closeTOC(); };

        // Нав-бар
        document.getElementById('prevBtn').onpointerup = e => { e.preventDefault(); if (currentChapter > 0) goTo(currentChapter - 1); };
        document.getElementById('nextBtn').onpointerup = e => { e.preventDefault(); if (currentChapter < chaptersData.length - 1) goTo(currentChapter + 1); };

        // Настройки
        function openSettings() { document.getElementById('settingsModal').classList.add('open'); document.getElementById('settingsOverlay').classList.add('active'); }
        function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); document.getElementById('settingsOverlay').classList.remove('active'); }
        document.getElementById('settingsBtn').onpointerup = e => { e.preventDefault(); openSettings(); };
        document.getElementById('settingsOverlay').onpointerup = e => { e.preventDefault(); closeSettings(); };

        function changeBg(url) { document.getElementById('bgLayer').style.backgroundImage = `url('${url}')`; closeSettings(); }
        function changeFont(f) { document.querySelectorAll('.content').forEach(c => c.style.fontFamily = f); closeSettings(); }
        let darkMode = true;
        function toggleOpacity() {
            darkMode = !darkMode;
            document.getElementById('textWindow').style.background = darkMode ? 'rgba(0,0,0,1)' : 'rgba(0,0,0,0.15)';
            closeSettings();
        }

        // Админка
        const adminPanel = document.getElementById('adminPanel');
        const adminOverlay = document.getElementById('adminOverlay');
        function openAdmin() {
            const pw = prompt('Пароль автора:');
            if (pw !== ADMIN_PASSWORD) { alert('Неверно'); return; }
            adminPanel.classList.add('open'); adminOverlay.classList.add('active');
            refreshChapterList();
        }
        function closeAdmin() {
            adminPanel.classList.remove('open'); adminOverlay.classList.remove('active');
            cancelEdit(); renderAll(); buildTOC(); if (chaptersData.length) goTo(Math.min(currentChapter, chaptersData.length-1));
        }
        document.getElementById('secretAdminBtn').onpointerup = e => { e.preventDefault(); openAdmin(); };
        document.getElementById('adminClose').onpointerup = e => { e.preventDefault(); closeAdmin(); };
        adminOverlay.onpointerup = e => { e.preventDefault(); closeAdmin(); };

        function refreshChapterList() {
            const c = document.getElementById('chapterListContainer');
            if (!chaptersData.length) { c.innerHTML = '<p style="color:#666;text-align:center;">Нет глав</p>'; return; }
            c.innerHTML = chaptersData.map((ch,i) => `
                <div class="chapter-list-item"><span>${esc(ch.title)}</span>
                <button class="edit-btn" data-idx="${i}">✏️</button>
                <button data-idx="${i}">🗑</button></div>`).join('');
            c.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', () => editChapter(parseInt(b.dataset.idx))));
            c.querySelectorAll('button:not(.edit-btn)').forEach(b => b.addEventListener('click', () => deleteChapter(parseInt(b.dataset.idx))));
        }

        function editChapter(i) {
            document.getElementById('chapterTitleInput').value = chaptersData[i].title;
            document.getElementById('chapterTextInput').value = chaptersData[i].content;
            document.getElementById('editingChapterIndex').value = i;
            document.getElementById('saveChapterBtn').textContent = '💾 Обновить';
            document.getElementById('cancelEditBtn').style.display = 'block';
        }
        function cancelEdit() {
            document.getElementById('chapterTitleInput').value = '';
            document.getElementById('chapterTextInput').value = '';
            document.getElementById('editingChapterIndex').value = '-1';
            document.getElementById('saveChapterBtn').textContent = '💾 Сохранить';
            document.getElementById('cancelEditBtn').style.display = 'none';
        }
        async function deleteChapter(i) {
            if (!confirm('Удалить?')) return;
            chaptersData.splice(i,1);
            await uploadChapters();
            refreshChapterList(); renderAll(); buildTOC();
        }
        document.getElementById('saveChapterBtn').onclick = async () => {
            const t = document.getElementById('chapterTitleInput').value.trim();
            const c = document.getElementById('chapterTextInput').value.trim();
            if (!t || !c) return;
            const i = parseInt(document.getElementById('editingChapterIndex').value);
            if (i >= 0) chaptersData[i] = { title: t, content: c };
            else chaptersData.push({ title: t, content: c });
            await uploadChapters();
            cancelEdit(); refreshChapterList(); renderAll(); buildTOC();
        };
        document.getElementById('cancelEditBtn').onclick = cancelEdit;
        document.getElementById('exportBtn').onclick = () => {
            const b = new Blob([JSON.stringify(chaptersData)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'история.json'; a.click();
        };
        document.getElementById('importBtn').onclick = () => document.getElementById('importFileInput').click();
        document.getElementById('importFileInput').onchange = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = async (ev) => {
                try { chaptersData = JSON.parse(ev.target.result); await uploadChapters(); refreshChapterList(); renderAll(); buildTOC(); } catch(ex) {}
            };
            r.readAsText(f);
        };

        // Инит
        (async () => {
            await fetchChapters();
            document.getElementById('loader').classList.add('hidden');
            renderAll(); buildTOC();
            if (chaptersData.length) {
                goTo(0);
                document.getElementById('nextBtn').disabled = chaptersData.length <= 1;
            }
        })();
    </script>
</body>
</html>
