<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Читалка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Georgia', serif;
            background: #0d0d1a;
            color: #e0e0e0;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1920');
            background-size: cover;
            background-position: center;
            filter: blur(4px) brightness(0.25);
            z-index: 0;
            transition: background-image 0.8s ease;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Загрузка */
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .loader.hidden {
            display: none;
        }
        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #6c5ce7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .loader-text {
            color: #aaa;
            font-size: 14px;
        }

        /* Оглавление */
        .toc-panel {
            position: fixed;
            top: 0;
            left: -85%;
            width: 85%;
            max-width: 340px;
            height: 100%;
            height: 100dvh;
            background: rgba(10, 10, 20, 0.97);
            backdrop-filter: blur(20px);
            z-index: 30;
            padding: 0;
            display: flex;
            flex-direction: column;
            transition: left 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }
        .toc-panel.open {
            left: 0;
        }

        .toc-header {
            padding: 20px 20px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }
        .toc-header h2 {
            font-size: 20px;
            color: #fff;
            font-weight: normal;
            letter-spacing: 0.5px;
        }

        .toc-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            -webkit-overflow-scrolling: touch;
        }
        .toc-list::-webkit-scrollbar {
            width: 2px;
        }
        .toc-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .toc-item {
            display: block;
            width: 100%;
            padding: 16px 20px;
            text-align: left;
            background: none;
            border: none;
            color: #bbb;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            font-family: 'Georgia', serif;
            line-height: 1.4;
        }
        .toc-item:active {
            background: rgba(255, 255, 255, 0.05);
        }
        .toc-item.active {
            color: #fff;
            border-left-color: #6c5ce7;
            background: rgba(108, 92, 231, 0.12);
        }
        .toc-item .chapter-num {
            display: block;
            font-size: 11px;
            color: #6c5ce7;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        /* Контейнер читалки */
        .reader-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 750px;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .text-window {
            flex: 1;
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(10px);
            padding: 30px 22px 40px;
            min-height: 100vh;
            min-height: 100dvh;
            border: none;
            transition: background 0.3s;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            position: sticky;
            top: 0;
            z-index: 5;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            margin: -30px -22px 20px;
            padding: 15px 22px;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .menu-btn:active {
            background: rgba(255, 255, 255, 0.18);
        }
        .menu-btn span {
            display: block;
            width: 18px;
            height: 2px;
            background: #ddd;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .chapter-title-top {
            font-size: 16px;
            color: #aaa;
            text-align: right;
            flex: 1;
            margin-left: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .content {
            font-size: 17px;
            line-height: 1.85;
            text-align: justify;
            word-break: break-word;
            hyphens: auto;
            -webkit-hyphens: auto;
        }
        .content p {
            margin-bottom: 16px;
        }

        .float-img-left,
        .float-img-right,
        .float-img-circle {
            max-width: 45%;
            margin: 8px 14px 10px;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .float-img-left {
            float: left;
            margin-left: 0;
            shape-outside: margin-box;
        }
        .float-img-right {
            float: right;
            margin-right: 0;
            shape-outside: margin-box;
        }
        .float-img-circle {
            float: left;
            border-radius: 50%;
            shape-outside: circle(50%);
            width: 140px;
            height: 140px;
            object-fit: cover;
            margin-left: 0;
        }

        .chapter-heading {
            font-size: 26px;
            text-align: center;
            color: #fff;
            margin: 10px 0 25px;
            font-weight: normal;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 15px rgba(108, 92, 231, 0.4);
        }

        /* АВТОРСКАЯ ПАНЕЛЬ */
        .admin-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 500px;
            height: 100%;
            height: 100dvh;
            background: rgba(5, 5, 15, 0.98);
            backdrop-filter: blur(20px);
            z-index: 35;
            display: flex;
            flex-direction: column;
            transition: right 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }
        .admin-panel.open {
            right: 0;
        }

        .admin-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .admin-header h2 {
            font-size: 20px;
            color: #fff;
        }
        .admin-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-close:active {
            background: rgba(255, 60, 60, 0.5);
        }

        .admin-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .admin-body label {
            display: block;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 6px;
            margin-top: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .admin-body input,
        .admin-body textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-family: 'Georgia', serif;
            resize: vertical;
        }
        .admin-body textarea {
            min-height: 120px;
            line-height: 1.6;
        }
        .admin-body input:focus,
        .admin-body textarea:focus {
            outline: none;
            border-color: #6c5ce7;
            background: rgba(108, 92, 231, 0.08);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            margin-top: 12px;
            font-family: 'Georgia', serif;
            transition: all 0.2s;
            text-align: center;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: #6c5ce7;
            color: #fff;
        }
        .btn-primary:active {
            background: #5a4bd1;
        }
        .btn-success {
            background: #00b894;
            color: #fff;
        }
        .btn-success:active {
            background: #00a381;
        }
        .btn-warning {
            background: #e17055;
            color: #fff;
        }
        .btn-warning:active {
            background: #d63031;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ddd;
        }
        .btn-outline:active {
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-row {
            display: flex;
            gap: 8px;
        }
        .btn-row .btn {
            flex: 1;
        }

        .chapter-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            margin-bottom: 8px;
            gap: 8px;
        }
        .chapter-list-item span {
            flex: 1;
            font-size: 14px;
            color: #ddd;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chapter-list-item button {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            color: #ddd;
            font-size: 12px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .chapter-list-item button:active {
            background: rgba(255, 60, 60, 0.4);
        }
        .chapter-list-item button.edit-btn:active {
            background: rgba(108, 92, 231, 0.4);
        }

        .info-box {
            background: rgba(108, 92, 231, 0.15);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 10px;
            padding: 14px;
            margin: 12px 0;
            font-size: 13px;
            color: #bbb;
            line-height: 1.5;
        }
        .info-box strong {
            color: #fff;
        }
        .sync-status {
            font-size: 12px;
            text-align: center;
            margin-top: 6px;
            color: #888;
        }
        .sync-status.success {
            color: #00b894;
        }
        .sync-status.error {
            color: #e17055;
        }

        /* Нижняя навигация */
        .nav-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            gap: 10px;
        }
        .nav-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ddd;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            white-space: nowrap;
            flex: 1;
            text-align: center;
            font-family: 'Georgia', serif;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:active {
            background: rgba(108, 92, 231, 0.3);
            border-color: #6c5ce7;
        }
        .nav-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        .nav-btn .arrow {
            font-size: 18px;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-end;
        }
        .fab-top {
            bottom: auto;
            top: 24px;
            right: 20px;
            z-index: 11;
        }
        .fab-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .fab-btn:active {
            background: #6c5ce7;
            transform: scale(0.92);
        }
        .fab-sub {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 6px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: all 0.25s ease;
        }
        .fab-sub.open {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }
        .fab-sub-btn {
            padding: 10px 16px;
            border-radius: 20px;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ddd;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            text-align: center;
            transition: all 0.2s;
            font-family: 'Georgia', serif;
        }
        .fab-sub-btn:active {
            background: #6c5ce7;
            color: #fff;
        }

        .chapter-content {
            display: none;
            animation: fadeSlide 0.35s ease;
        }
        .chapter-content.active {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
        }
        .empty-state .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .empty-state h3 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: normal;
        }
        .empty-state p {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .text-window {
                padding: 20px 14px 30px;
            }
            .top-bar {
                margin: -20px -14px 18px;
                padding: 12px 14px;
            }
            .content {
                font-size: 16px;
                line-height: 1.75;
            }
            .float-img-left,
            .float-img-right,
            .float-img-circle {
                float: none;
                display: block;
                max-width: 100%;
                width: 100%;
                margin: 12px 0;
                height: auto;
                border-radius: 10px;
            }
            .float-img-circle {
                height: 220px;
                object-fit: cover;
            }
            .chapter-heading {
                font-size: 22px;
                margin: 5px 0 18px;
            }
            .nav-btn {
                padding: 10px 8px;
                font-size: 13px;
                min-height: 44px;
            }
            .fab {
                bottom: 16px;
                right: 12px;
            }
            .toc-panel {
                left: -90%;
                width: 90%;
            }
            .admin-panel {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Задний фон -->
    <div class="background-layer" id="bgLayer"></div>

    <!-- Загрузчик -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Загрузка истории...</div>
    </div>

    <!-- Затемнение -->
    <div class="overlay" id="overlay"></div>

    <!-- Оглавление -->
    <div class="toc-panel" id="tocPanel">
        <div class="toc-header"><h2>📖 Оглавление</h2></div>
        <div class="toc-list" id="tocList"></div>
    </div>

    <!-- Затемнение админки -->
    <div class="overlay" id="adminOverlay" style="z-index:33;"></div>

    <!-- АВТОРСКАЯ ПАНЕЛЬ -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h2>✍️ Панель автора</h2>
            <button class="admin-close" id="adminClose">✕</button>
        </div>
        <div class="admin-body" id="adminBody">
            <div class="info-box">
                <strong>☁️ Облачная синхронизация</strong><br>
                Главы сохраняются на сервер. Все читатели видят изменения мгновенно.
            </div>

            <label>Название главы</label>
            <input type="text" id="chapterTitleInput" placeholder="Например: Глава 1: Начало пути">

            <label>Текст главы (можно HTML)</label>
            <textarea id="chapterTextInput" placeholder="Вставьте текст главы...&#10;&#10;Картинки с обтеканием:&#10;&lt;img src=&quot;ССЫЛКА&quot; class=&quot;float-img-left&quot;&gt;&#10;&lt;img src=&quot;ССЫЛКА&quot; class=&quot;float-img-right&quot;&gt;&#10;&lt;img src=&quot;ССЫЛКА&quot; class=&quot;float-img-circle&quot;&gt;"></textarea>

            <input type="hidden" id="editingChapterIndex" value="-1">

            <div class="btn-row">
                <button class="btn btn-primary" id="saveChapterBtn">💾 Сохранить главу</button>
                <button class="btn btn-outline" id="cancelEditBtn" style="display:none;">Отмена</button>
            </div>

            <label style="margin-top:24px;">📋 Все главы</label>
            <div id="chapterListContainer">
                <p style="color:#666;font-size:13px;text-align:center;padding:20px;">Загрузка...</p>
            </div>

            <div class="btn-row">
                <button class="btn btn-success" id="exportBtn">📤 Скачать JSON</button>
                <button class="btn btn-outline" id="importBtn">📥 Загрузить JSON</button>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display:none;">

            <p class="sync-status" id="syncStatus"></p>
        </div>
    </div>

    <!-- Кнопка админа -->
    <div class="fab fab-top">
        <button class="fab-btn" id="secretAdminBtn" title="Панель автора" style="font-size:14px;opacity:0.5;">🔑</button>
    </div>

    <!-- Читалка -->
    <div class="reader-container">
        <div class="text-window" id="textWindow">
            <div class="top-bar">
                <div class="menu-btn" id="menuBtn">
                    <span></span><span></span><span></span>
                </div>
                <div class="chapter-title-top" id="chapterTitleTop">Загрузка...</div>
            </div>

            <div id="chaptersContainer"></div>

            <div class="nav-footer">
                <button class="nav-btn" id="prevBtn" disabled><span class="arrow">◀</span> Назад</button>
                <button class="nav-btn" id="nextBtn" disabled>Далее <span class="arrow">▶</span></button>
            </div>
        </div>
    </div>

    <!-- FAB настроек -->
    <div class="fab">
        <div class="fab-sub" id="fabSub">
            <button class="fab-sub-btn" onclick="changeBackground('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1920')">🌄 Горы</button>
            <button class="fab-sub-btn" onclick="changeBackground('https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1920')">🌊 Океан</button>
            <button class="fab-sub-btn" onclick="changeBackground('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1920')">🌿 Лес</button>
            <button class="fab-sub-btn" onclick="changeFont('Georgia')">🔤 Georgia</button>
            <button class="fab-sub-btn" onclick="changeFont('Arial')">🔤 Arial</button>
            <button class="fab-sub-btn" onclick="toggleBgOpacity()">🌗 Темнее</button>
        </div>
        <button class="fab-btn" id="fabBtn">⚙️</button>
    </div>

    <script>
        // ==================== КОНФИГУРАЦИЯ ====================
        // ЗАМЕНИТЕ НА СВОИ ДАННЫЕ:
        const JSONBIN_API_KEY = '$2a$10$lUsFR/tlJG9up4GH19dk8ODP.6uXsPC0sA/smcd/5G7T2wkRGsxPS'; // Ключ из шага 1
        const JSONBIN_BIN_ID = 'https://api.jsonbin.io/v3/b/69fa2f56856a682189ad44b0'; // ID корзины из шага 2
        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let chaptersData = [];
        let currentChapter = 0;
        let isAdmin = false; // Админ-режим активируется только после открытия панели + пароля

        // ==================== API: ЗАГРУЗКА С СЕРВЕРА ====================
        async function fetchChapters() {
            try {
                const resp = await fetch(JSONBIN_URL, {
                    headers: {
                        'X-Access-Key': JSONBIN_API_KEY
                    }
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const json = await resp.json();
                chaptersData = json.record;
                if (!Array.isArray(chaptersData)) chaptersData = [];
                return true;
            } catch (err) {
                console.error('Ошибка загрузки с сервера:', err);
                // Пробуем загрузить из localStorage как резерв
                const local = localStorage.getItem('reader_chapters_backup');
                if (local) {
                    try {
                        chaptersData = JSON.parse(local);
                    } catch (e) {
                        chaptersData = [];
                    }
                }
                return false;
            }
        }

        // ==================== API: СОХРАНЕНИЕ НА СЕРВЕР ====================
        async function uploadChapters() {
            try {
                const resp = await fetch(JSONBIN_URL, {
                    method: 'PUT',
                    headers: {
                        'X-Access-Key': JSONBIN_API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(chaptersData)
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                // Сохраняем локальную копию
                localStorage.setItem('reader_chapters_backup', JSON.stringify(chaptersData));
                return true;
            } catch (err) {
                console.error('Ошибка сохранения на сервер:', err);
                // Сохраняем локально в любом случае
                localStorage.setItem('reader_chapters_backup', JSON.stringify(chaptersData));
                return false;
            }
        }

        // ==================== ОТОБРАЖЕНИЕ ГЛАВ ====================
        function renderAllChapters() {
            const container = document.getElementById('chaptersContainer');
            if (!chaptersData.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📚</div>
                        <h3>Здесь пока пусто</h3>
                        <p>Автор ещё не добавил ни одной главы.</p>
                    </div>`;
                document.getElementById('chapterTitleTop').textContent = 'Читалка';
                document.getElementById('prevBtn').disabled = true;
                document.getElementById('nextBtn').disabled = true;
                return;
            }

            container.innerHTML = chaptersData.map((ch, i) => `
                <div class="chapter-content${i === 0 ? ' active' : ''}" data-chapter="${i + 1}">
                    <h1 class="chapter-heading">${escapeHTML(ch.title)}</h1>
                    <div class="content">${ch.content}</div>
                </div>
            `).join('');
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
